<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center">Đăng Nhập</h2>
    <div class="mb-4">
      <label class="block mb-1">Tên đăng nhập</label>
      <input formControlName="username" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500">
    </div>
    <div class="mb-6">
      <label class="block mb-1">Mật khẩu</label>
      <input formControlName="password" type="password" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500">
    </div>
    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold">XÁC NHẬN</button>
  </form>
</div>
