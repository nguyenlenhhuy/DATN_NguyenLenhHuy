<div class="min-h-screen bg-slate-900 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto w-full max-w-md">
    <h2 class="text-center text-3xl font-extrabold text-white">ĐĂNG NHẬP HỆ THỐNG</h2>
  </div>

  <div class="mt-8 sm:mx-auto w-full max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
      <form class="space-y-6" (ngSubmit)="onLogin()">
        
        <div>
          <label class="block text-sm font-medium text-gray-700">Tài khoản (Email hoặc Username)</label>
          <div class="mt-1">
            <input 
              name="username" 
              [(ngModel)]="loginData.username" 
              type="text" 
              required 
              placeholder="Nhập email hoặc username"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">Mật khẩu</label>
          <div class="mt-1">
            <input 
              name="password" 
              [(ngModel)]="loginData.password" 
              type="password" 
              required 
              placeholder="Nhập mật khẩu"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm">
          </div>
        </div>

        <div *ngIf="errorMessage" class="text-red-600 text-sm font-medium bg-red-50 p-2 rounded">
          ⚠️ {{ errorMessage }}
        </div>

        <div>
          <button type="submit" class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
            Đăng nhập
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
