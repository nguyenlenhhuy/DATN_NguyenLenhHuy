<div class="min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="max-w-md w-full bg-white rounded-3xl shadow-xl p-8">
    <h2 class="text-2xl font-bold text-center mb-6">Quên mật khẩu</h2>

    <div *ngIf="step === 1">
      <input [(ngModel)]="email" placeholder="Nhập email tài khoản" class="w-full p-4 border rounded-2xl mb-4">
      <button (click)="sendOtp()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-2xl">Gửi mã xác thực</button>
    </div>

    <div *ngIf="step === 2">
      <p class="text-sm text-gray-500 mb-4">Nhập mã OTP vừa gửi đến email của bạn</p>
      <input [(ngModel)]="otp" placeholder="Mã OTP" class="w-full p-4 border rounded-2xl mb-4">
      <input [(ngModel)]="newPassword" type="password" placeholder="Mật khẩu mới" class="w-full p-4 border rounded-2xl mb-4">
      <button (click)="resetPassword()" class="w-full py-4 bg-green-600 text-white font-bold rounded-2xl">Đổi mật khẩu</button>
    </div>
  </div>
</div>
