<div class="min-h-screen bg-[#0f172a] flex items-center justify-center p-4 relative overflow-hidden font-sans">
  <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-blue-600/20 rounded-full blur-[120px]"></div>
  
  <div class="w-full max-w-[480px] z-10">
    <div class="bg-white/5 backdrop-blur-2xl border border-white/10 p-10 rounded-[3rem] shadow-2xl">
      <div class="text-center mb-8">
        <h2 class="text-3xl font-black text-white tracking-tight">Khôi phục mật khẩu</h2>
        <p class="text-slate-400 mt-2 font-medium">{{ step === 1 ? 'Nhập email để nhận mã OTP' : 'Thiết lập mật khẩu mới' }}</p>
      </div>

      <div *ngIf="message" class="mb-6 p-4 bg-white/5 border border-white/10 text-blue-400 rounded-2xl text-sm font-bold text-center">
        {{ message }}
      </div>

      <div *ngIf="step === 1" class="space-y-6">
        <input type="email" [(ngModel)]="email" placeholder="Email đăng ký"
          class="w-full bg-white/5 border-2 border-white/5 rounded-2xl p-4 text-white outline-none focus:border-blue-500/50">
        <button (click)="sendOtp()" [disabled]="isLoading" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-600/20">
          Gửi mã xác thực
        </button>
      </div>

      <div *ngIf="step === 2" class="space-y-4">
        <input type="text" [(ngModel)]="otp" placeholder="Nhập 6 số OTP" class="w-full bg-white/5 border-2 border-white/5 rounded-2xl p-4 text-white text-center tracking-[1em]">
        <input type="password" [(ngModel)]="newPassword" placeholder="Mật khẩu mới" class="w-full bg-white/5 border-2 border-white/5 rounded-2xl p-4 text-white outline-none">
        <input type="password" [(ngModel)]="confirmPassword" placeholder="Xác nhận mật khẩu" class="w-full bg-white/5 border-2 border-white/5 rounded-2xl p-4 text-white outline-none">
        <button (click)="handleResetPassword()" [disabled]="isLoading" class="w-full bg-emerald-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-emerald-600/20">
          Cập nhật mật khẩu
        </button>
      </div>

      <div class="mt-8 pt-8 border-t border-white/5 text-center">
        <a routerLink="/login" class="text-slate-500 hover:text-white text-xs font-bold uppercase tracking-widest flex items-center justify-center">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
          Quay lại đăng nhập
        </a>
      </div>
    </div>
  </div>
</div>
