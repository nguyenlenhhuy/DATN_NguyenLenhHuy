<div class="min-h-screen bg-[#090b11] flex items-center justify-center p-4 font-sans relative overflow-hidden selection:bg-[#d4af37]/30 selection:text-white">
  
  <a routerLink="/" class="absolute top-6 left-6 z-20 flex items-center gap-2 text-slate-500 hover:text-[#d4af37] transition-all text-[10px] uppercase tracking-[0.2em] group">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 transition-transform group-hover:-translate-x-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
    </svg>
    Trang chủ
  </a>

  <div class="absolute top-[-20%] left-[-10%] w-[600px] h-[600px] bg-[#d4af37]/10 rounded-full blur-[150px] pointer-events-none animate-pulse"></div>
  <div class="absolute bottom-[-20%] right-[-10%] w-[500px] h-[500px] bg-blue-500/5 rounded-full blur-[120px] pointer-events-none"></div>

  <div class="max-w-md w-full z-10 transition-all duration-500">
    <div class="bg-[#11141d]/60 backdrop-blur-2xl border border-white/[0.08] p-8 md:p-10 rounded-[2.5rem] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.8)] relative overflow-hidden">
      
      <div class="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-[#d4af37]/30 to-transparent"></div>

      <div class="text-center mb-10">
        <h1 class="text-3xl font-serif text-transparent bg-clip-text bg-gradient-to-r from-[#f3e7c4] via-[#d4af37] to-[#aa8421] tracking-[0.3em] mb-3 uppercase font-medium">
          LuxeHotel
        </h1>
        <div class="flex items-center justify-center gap-3">
          <span class="h-[1px] w-6 bg-slate-700"></span>
          <p class="text-slate-400 text-[9px] tracking-[0.4em] uppercase font-light">
            {{ isWaitingOtp ? 'Xác thực đặc quyền' : 'Thành viên đặc quyền' }}
          </p>
          <span class="h-[1px] w-6 bg-slate-700"></span>
        </div>
      </div>

      <div *ngIf="errorMsg" class="mb-6 p-4 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-2xl text-[11px] text-center animate-in fade-in slide-in-from-top-2">
        {{ errorMsg }}
      </div>

      <form *ngIf="!isWaitingOtp" [formGroup]="registerForm" (ngSubmit)="onRegister()" class="space-y-5" autocomplete="off">
        <div class="grid grid-cols-1 gap-5">
          <div class="space-y-1.5">
            <label class="text-[9px] text-slate-500 font-medium uppercase tracking-[0.2em] ml-1">Họ và tên</label>
            <input formControlName="fullName" type="text" class="w-full bg-[#161a24]/40 border border-white/[0.05] rounded-2xl py-3.5 px-5 text-sm text-white focus:border-[#d4af37]/50 focus:bg-[#161a24]/80 outline-none transition-all placeholder:text-slate-700" placeholder="Nguyễn Văn Huy">
          </div>

          <div class="space-y-1.5">
            <label class="text-[9px] text-slate-500 font-medium uppercase tracking-[0.2em] ml-1">Địa chỉ Email</label>
            <input formControlName="email" type="email" class="w-full bg-[#161a24]/40 border border-white/[0.05] rounded-2xl py-3.5 px-5 text-sm text-white focus:border-[#d4af37]/50 focus:bg-[#161a24]/80 outline-none transition-all placeholder:text-slate-700" placeholder="huy@example.com">
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="space-y-1.5">
              <label class="text-[9px] text-slate-500 font-medium uppercase tracking-[0.2em] ml-1">Số điện thoại</label>
              <input formControlName="phone" type="text" class="w-full bg-[#161a24]/40 border border-white/[0.05] rounded-2xl py-3.5 px-5 text-sm text-white focus:border-[#d4af37]/50 focus:bg-[#161a24]/80 outline-none transition-all placeholder:text-slate-700" placeholder="090...">
            </div>
            <div class="space-y-1.5">
              <label class="text-[9px] text-slate-500 font-medium uppercase tracking-[0.2em] ml-1">Mật khẩu</label>
              <input formControlName="password" type="password" class="w-full bg-[#161a24]/40 border border-white/[0.05] rounded-2xl py-3.5 px-5 text-sm text-white focus:border-[#d4af37]/50 focus:bg-[#161a24]/80 outline-none transition-all placeholder:text-slate-700" placeholder="••••••••">
            </div>
          </div>
        </div>

        <div class="flex items-start gap-3 pt-2 pb-2">
          <div class="relative flex items-center">
            <input type="checkbox" id="terms" formControlName="terms" class="peer h-4 w-4 opacity-0 absolute cursor-pointer">
            <div class="h-4 w-4 border border-white/20 rounded peer-checked:bg-[#d4af37] peer-checked:border-[#d4af37] transition-all flex items-center justify-center text-black">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd" /></svg>
            </div>
          </div>
          <label for="terms" class="text-[10px] text-slate-500 cursor-pointer select-none leading-tight">
            Tôi đồng ý với các <span class="text-[#d4af37] border-b border-[#d4af37]/30">điều khoản bảo mật</span> đặc quyền.
          </label>
        </div>

        <button type="submit" [disabled]="registerForm.invalid || isLoading" class="group relative w-full py-4 bg-gradient-to-r from-[#d4af37] to-[#b8962e] disabled:from-slate-800 disabled:to-slate-800 disabled:text-slate-600 text-black font-bold text-[10px] uppercase tracking-[0.3em] rounded-2xl transition-all shadow-[0_20px_40px_-12px_rgba(212,175,55,0.3)] hover:shadow-[0_20px_40px_-8px_rgba(212,175,55,0.5)] active:scale-[0.98] overflow-hidden">
          <span class="relative z-10 flex items-center justify-center gap-3">
            <svg *ngIf="isLoading" class="animate-spin h-4 w-4" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            {{ isLoading ? 'Đang gửi yêu cầu...' : 'Kích hoạt đặc quyền' }}
          </span>
        </button>
      </form>

      <div *ngIf="isWaitingOtp" class="space-y-8 animate-in fade-in zoom-in duration-500">
        <div class="bg-white/5 border border-white/10 p-6 rounded-[2rem] text-center space-y-3">
          <div class="w-12 h-12 bg-[#d4af37]/10 rounded-full flex items-center justify-center mx-auto mb-2 text-[#d4af37]">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" /></svg>
          </div>
          <p class="text-[10px] text-slate-400 uppercase tracking-widest">Mã xác thực đã được gửi tới</p>
          <div class="flex items-center justify-center gap-2 group">
            <span class="text-white font-medium text-sm">{{ userEmail }}</span>
            <button (click)="isEditingEmail = !isEditingEmail" class="p-1.5 hover:bg-white/10 rounded-lg transition-all">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-[#d4af37]" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" /></svg>
            </button>
          </div>
        </div>

        <div *ngIf="isEditingEmail" class="space-y-3 animate-in slide-in-from-top-4 duration-300">
          <input [(ngModel)]="newEmailInput" type="email" class="w-full bg-[#090b11] border border-[#d4af37]/30 rounded-xl py-3 px-4 text-xs text-white outline-none focus:border-[#d4af37]" placeholder="Nhập email mới">
          <button (click)="updateEmail()" class="w-full py-2.5 bg-white/5 text-[#d4af37] text-[9px] uppercase tracking-[0.2em] rounded-xl hover:bg-white/10 border border-[#d4af37]/20 transition-all">Cập nhật & Gửi lại mã</button>
        </div>

        <div class="space-y-4">
          <label class="text-[9px] text-slate-500 font-medium uppercase tracking-[0.3em] text-center block">Nhập mã xác thực 6 chữ số</label>
          <div class="relative group">
            <input [(ngModel)]="otpValue" type="text" maxlength="6" 
              class="w-full bg-[#161a24]/60 border border-white/10 rounded-2xl py-5 text-3xl text-center tracking-[0.8em] text-[#d4af37] font-serif focus:border-[#d4af37] focus:bg-[#161a24] outline-none transition-all shadow-inner" 
              placeholder="000000">
            <div class="absolute inset-0 rounded-2xl bg-[#d4af37]/5 pointer-events-none group-focus-within:block hidden"></div>
          </div>
        </div>

        <button (click)="onVerify()" [disabled]="isLoading || otpValue.length < 6" class="w-full py-4 bg-gradient-to-r from-[#d4af37] to-[#b8962e] text-black font-bold text-[10px] uppercase tracking-[0.3em] rounded-2xl shadow-xl hover:brightness-110 transition-all active:scale-95">
          {{ isLoading ? 'Đang xác thực...' : 'Xác nhận danh tính' }}
        </button>

        <button (click)="isWaitingOtp = false" class="w-full text-[9px] text-slate-500 hover:text-[#d4af37] uppercase tracking-[0.25em] transition-colors">
          Quay lại trang đăng ký
        </button>
      </div>

      <div *ngIf="!isWaitingOtp" class="mt-10 text-center relative z-10">
        <p class="text-[10px] text-slate-500 tracking-widest">
          Đã là thành viên? 
          <a routerLink="/login" class="text-[#d4af37] hover:text-[#f3e7c4] ml-2 transition-colors font-semibold uppercase">Đăng nhập ngay</a>
        </p>
      </div>

    </div>
  </div>
</div>
