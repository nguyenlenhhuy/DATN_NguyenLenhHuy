<div class="flex h-screen bg-gray-100 overflow-hidden">
  <aside class="w-64 bg-slate-800 text-white flex flex-col justify-between shadow-lg">
    <div>
      <div class="p-5 text-center bg-slate-900 font-bold text-xl tracking-wider border-b border-slate-700">
        🏨 HOTEL MANAGEMENT
      </div>
      <nav class="mt-5 px-3 space-y-1">
        <a routerLink="/admin/dashboard" routerLinkActive="bg-blue-600 text-white" class="flex items-center px-4 py-3 text-gray-300 hover:bg-slate-700 hover:text-white rounded-md transition duration-200">
          <span class="mx-3">Tổng quan báo cáo</span>
        </a>
        <a routerLink="/admin/bookings" routerLinkActive="bg-blue-600 text-white" class="flex items-center px-4 py-3 text-gray-300 hover:bg-slate-700 hover:text-white rounded-md transition duration-200">
          <span class="mx-3">Quản lý đặt phòng</span>
        </a>
        <a routerLink="/admin/rooms" routerLinkActive="bg-blue-600 text-white" class="flex items-center px-4 py-3 text-gray-300 hover:bg-slate-700 hover:text-white rounded-md transition duration-200">
          <span class="mx-3">Quản lý phòng</span>
        </a>
      </nav>
    </div>
    <div class="p-4">
      <button (click)="logout()" class="w-full bg-red-600 hover:bg-red-700 text-white py-2 px-4 rounded-md font-medium transition duration-200">
        Đăng xuất
      </button>
    </div>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden">
    <header class="h-16 bg-white shadow flex items-center justify-between px-8 z-10">
      <h1 class="text-xl font-semibold text-gray-800">Hệ thống quản trị</h1>
      <div class="flex items-center space-x-3">
        <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white font-bold">
          {{ currentUsername.charAt(0).toUpperCase() }}
        </div>
        <span class="text-gray-700 font-medium">Xin chào, {{ currentUsername }}</span>
      </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-50 p-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
